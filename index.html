</html<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bestie 💖</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
    }header {
  padding: 50px;
  font-size: 2.5em;
  font-weight: bold;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

img {
  width: 100%;
  border-radius: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff6f91;
  color: white;
  font-size: 1em;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #ff3f6c;
}

  </style>
</head>
<body><header>
  For My Bestie 💕
</header><div class="container">
  <div class="card">
    <h2>You Are Amazing 🌟</h2>
    <p>Thank you for always being there for me. You make life brighter and happier!</p>
  </div>  <div class="card">
    <h2>Our Memories 📸</h2>
    <img src="https://via.placeholder.com/400" alt="Bestie Photo">
    <p>Every moment with you is special!</p>
  </div>  <div class="card">
    <h2>A Message 💌</h2>
    <p id="message">Click the button to see how much you mean to me!</p>
    <button onclick="showMessage()">Click Me</button>
  </div>
</div><script>
  function showMessage() {
    document.getElementById('message').innerText = I love you my besti 🥹💖🫰";
  }
</script></body>
</html>
